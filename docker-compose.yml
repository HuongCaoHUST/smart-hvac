services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - mqtt-subscriber
    restart: always

  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_DB: iotdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data

  mqtt-subscriber:
    build: ./mqtt-subscriber
    container_name: mqtt-subscriber
    restart: unless-stopped
    depends_on:
      - mosquitto
      - timescaledb
    ports:
      - "5000:5000"
    environment:
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      DB_HOST: timescaledb
      DB_NAME: iotdb
      DB_USER: admin
      DB_PASSWORD: admin123
      API_PORT: 5000
      PYTHONUNBUFFERED: 1

volumes:
  timescale_data:
